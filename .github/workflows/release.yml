name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache: true

      - name: Build
        run: |
          set -euo pipefail
          BIN=m3u-dl
          if [ "$GOOS" = "windows" ]; then BIN=m3u-dl.exe; fi
          OUT="m3u-dl-${{ github.ref_name }}-${GOOS}-${GOARCH}"
          mkdir -p "dist/${OUT}"
          go build -trimpath -ldflags="-s -w" -o "dist/${OUT}/${BIN}" ./cmd/m3u-dl
          cp README.md LICENSE config.example.toml "dist/${OUT}/"
          if [ "$GOOS" = "windows" ]; then
            (cd dist && zip -r "${OUT}.zip" "${OUT}")
          else
            (cd dist && tar -czf "${OUT}.tar.gz" "${OUT}")
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: m3u-dl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum *.tar.gz *.zip > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/SHA256SUMS
